name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - develop
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  # Hardcoded (jarang berubah)
  GO_VERSION: '1.24'
  GAR_LOCATION: asia-southeast1-a
  GAR_REPOSITORY: goilerplate
  IMAGE_NAME: goilerplate

jobs:
  # ==============================
  # TEST
  # ==============================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: |
          go mod download
          go test -v ./...

  # ==============================
  # BUILD
  # ==============================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.image.outputs.full }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push
        id: image
        run: |
          TAG="${GITHUB_SHA::7}"
          FULL="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${TAG}"
          
          docker build -t ${FULL} .
          docker push ${FULL}
          
          echo "full=${FULL}" >> $GITHUB_OUTPUT

  # ==============================
  # DEPLOY DEVELOP
  # ==============================
  deploy-develop:
    name: Deploy → Develop
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Deploy
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_DEV }} \
            --zone ${{ vars.GKE_ZONE_DEV }} \
            --project ${{ vars.GCP_PROJECT_ID }}
          
          sed -i 's|image: .*${{ env.IMAGE_NAME }}:.*|image: ${{ needs.build.outputs.image }}|g' \
            deploy/k8s/deployment.dev.yaml
          
          kubectl apply -f deploy/k8s/deployment.dev.yaml -n apps
          kubectl rollout status deployment/${{ env.IMAGE_NAME }} -n apps --timeout=300s

  # ==============================
  # DEPLOY PRODUCTION
  # ==============================
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Deploy
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_PROD }} \
            --zone ${{ vars.GKE_ZONE_PROD }} \
            --project ${{ vars.GCP_PROJECT_ID }}
          
          sed -i 's|image: .*${{ env.IMAGE_NAME }}:.*|image: ${{ needs.build.outputs.image }}|g' \
            deploy/k8s/deployment.prod.yaml
          
          kubectl apply -f deploy/k8s/deployment.prod.yaml -n apps
          kubectl rollout status deployment/${{ env.IMAGE_NAME }} -n apps --timeout=300s
