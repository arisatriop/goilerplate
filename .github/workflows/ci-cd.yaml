name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - staging
      - production

  workflow_dispatch:

env:
  GO_VERSION: '1.24'
  GAR_LOCATION: asia-southeast2
  GAR_REPOSITORY: goilerplate
  IMAGE_NAME: goilerplate

jobs:

# ==============================
# TEST
# ==============================
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - run: |
          go mod download
          go test -v ./...

# ==============================
# BUILD IMAGE
# ==============================
  build:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      id-token: write

    outputs:
      commit_sha: ${{ steps.vars.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - run: |
          TAG=${GITHUB_SHA::7}

          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${TAG}"

          docker build -t $IMAGE .
          docker push $IMAGE

# ==============================
# DEPLOY DEV (AUTO)
# ==============================
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'

    permissions:
      contents: read
      id-token: write

    steps:

      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_DEV }} \
            --zone ${{ vars.GKE_ZONE }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - run: |
          export PROJECT_ID=${{ vars.GCP_PROJECT_ID }}
          export COMMIT_SHA=${GITHUB_SHA::7}

          envsubst < deploy/k8s/deployment.dev.yaml | kubectl apply -f -

      - run: |
          kubectl rollout status deployment/goilerplate -n apps --timeout=300s

# ==============================
# DEPLOY STAGING (MANUAL)
# ==============================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'

    permissions:
      contents: read
      id-token: write

    steps:

      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_STAG }} \
            --zone ${{ vars.GKE_ZONE }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - run: |
          export PROJECT_ID=${{ vars.GCP_PROJECT_ID }}
          export COMMIT_SHA=${GITHUB_SHA::7}

          envsubst < deploy/k8s/deployment.stag.yaml | kubectl apply -f -

      - run: |
          kubectl rollout status deployment/goilerplate -n apps --timeout=300s

# ==============================
# DEPLOY PRODUCTION (MANUAL)
# ==============================
  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/production'
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:

      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_PROD }} \
            --zone ${{ vars.GKE_ZONE }} \
            --project ${{ vars.GCP_PROJECT_ID }}

      - run: |
          export PROJECT_ID=${{ vars.GCP_PROJECT_ID }}
          export COMMIT_SHA=${GITHUB_SHA::7}

          envsubst < deploy/k8s/deployment.prod.yaml | kubectl apply -f -

      - run: |
          kubectl rollout status deployment/goilerplate -n apps --timeout=300s