apiVersion: apps/v1
kind: Deployment
metadata:
  name: goilerplate
  labels:
    app: goilerplate
    environment: production
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: goilerplate
  template:
    metadata:
      labels:
        app: goilerplate
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: app
        image: asia-southeast2-docker.pkg.dev/free-tier-project-488416/goilerplate/goilerplate:${COMMIT_SHA}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        
        envFrom:
        - secretRef:
            name: goilerplate-secret
        
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

      volumes:
      - name: config-volume
        configMap:
          name: goilerplate-config
          items:
          - key: config.yaml
            path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: goilerplate-service
  labels:
    app: goilerplate
spec:
  selector:
    app: goilerplate
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: goilerplate-ingress
  labels:
    app: goilerplate
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: your.domain.id
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: goilerplate-service
            port:
              number: 80
      - path: /partner
        pathType: Prefix
        backend:
          service:
            name: goilerplate-service
            port:
              number: 80