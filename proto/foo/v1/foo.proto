syntax = "proto3";

package foo.v1;

option go_package = "goilerplate/proto/foo/v1";

// FooService provides CRUD operations for Foo resources.
service FooService {
  // CreateFoo creates a new Foo resource.
  rpc CreateFoo (CreateFooRequest) returns (CreateFooResponse);

  // GetFoo retrieves a Foo resource by ID.
  rpc GetFoo (GetFooRequest) returns (GetFooResponse);

  // ListFoos retrieves a paginated list of Foo resources.
  rpc ListFoos (ListFoosRequest) returns (ListFoosResponse);

  // UpdateFoo updates an existing Foo resource.
  rpc UpdateFoo (UpdateFooRequest) returns (UpdateFooResponse);

  // DeleteFoo deletes a Foo resource by ID.
  rpc DeleteFoo (DeleteFooRequest) returns (DeleteFooResponse);
}

// Foo represents the foo domain entity.
message Foo {
  string id         = 1;
  string code       = 2;
  string name       = 3;
}

// CreateFooRequest is the request message for CreateFoo.
message CreateFooRequest {
  string code = 1;
  string name = 2;
}

// CreateFooResponse is the response message for CreateFoo.
message CreateFooResponse {
  Foo foo = 1;
}

// GetFooRequest is the request message for GetFoo.
message GetFooRequest {
  string id = 1;
}

// GetFooResponse is the response message for GetFoo.
message GetFooResponse {
  Foo foo = 1;
}

// ListFoosRequest is the request message for ListFoos.
message ListFoosRequest {
  int32  page    = 1;
  int32  limit   = 2;
  string keyword = 3;
}

// ListFoosResponse is the response message for ListFoos.
message ListFoosResponse {
  repeated Foo foos  = 1;
  int64        total = 2;
  int32        page  = 3;
  int32        limit = 4;
}

// UpdateFooRequest is the request message for UpdateFoo.
message UpdateFooRequest {
  string id   = 1;
  string code = 2;
  string name = 3;
}

// UpdateFooResponse is the response message for UpdateFoo.
message UpdateFooResponse {
  Foo foo = 1;
}

// DeleteFooRequest is the request message for DeleteFoo.
message DeleteFooRequest {
  string id = 1;
}

// DeleteFooResponse is the response message for DeleteFoo.
message DeleteFooResponse {} 