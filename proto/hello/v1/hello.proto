syntax = "proto3";

package hello.v1;

option go_package = "goilerplate/proto/hello/v1";

// HelloService provides greeting operations.
service HelloService {
  // SayHello returns a greeting message for the given name.
  rpc SayHello (SayHelloRequest) returns (SayHelloResponse);
}

// SayHelloRequest is the request message for SayHello.
message SayHelloRequest {
  string name = 1;
}

// SayHelloResponse is the response message for SayHello.
message SayHelloResponse {
  string message = 1;
}
