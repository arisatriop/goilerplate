app:
  name: Goilerplate
  version: 1.0.0
  description: This is a sample application configuration file.

server:
  host:
  port: 3000
  prefork: false
  read_timeout: 5s
  write_timeout: 5s
  idle_timeout: 120s
  enable_cors: true
  cors:
    allow_origin: "*"
    allow_methods: "GET, POST, PUT, DELETE, OPTIONS"
    allow_headers: "Content-Type, Authorization"

db:
  host: localhost
  port: 5432
  name: goilerplate
  sslmode: disable  
  username: postgres
  password: postgres
  min_open_connections: 10
  max_open_connections: 100
  connection_max_lifetime: 300
  connection_max_idle_time: 60
  health_check_period: 30

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  dial_timeout: 5s
  read_timeout: 5s
  write_timeout: 5s
  pool_size: 10
  pool_timeout: 6s

elastic:
  enabled: true
  host: http://localhost:9200
  username: elastic
  password: changeme
  health_check_period: 30
  api_incoming_log_index: "goilerplate-api-incoming-log"
  api_outgoing_log_index: "goilerplate-api-outgoing-log"
  error_log_index: "goilerplate-error-log"

jwt:
  secret: secret
  refresh_secret: refresh-secret
  access_token_expiry: 3600      # 10m in seconds
  refresh_token_expiry: 604800  # 7d in seconds

log:
  level: 6
  output: stdout
